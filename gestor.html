<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblioteca | Gestor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-bs-theme="light">
    <main class="container my-4">
      <h1 class="h3 mb-3">Gestor de la aplicación</h1>
      <div class="row g-4">
        <div class="col-lg-7"><div class="card"><div class="card-body">
          <h2 class="h5">Dar de alta nuevo libro</h2>
          <form id="adminForm" class="row g-3">
            <div class="col-md-6"><label class="form-label" for="adminTitle">Título</label><input id="adminTitle" name="title" class="form-control" required/></div>
            <div class="col-md-6"><label class="form-label" for="adminAuthor">Autor</label><input id="adminAuthor" name="author" class="form-control" required/></div>
            <div class="col-md-4"><label class="form-label" for="adminCategory">Categoría</label><select id="adminCategory" name="category" class="form-select"><option value="novela">Novela</option><option value="programacion">Programación</option><option value="historia">Historia</option></select></div>
            <div class="col-md-4"><label class="form-label" for="adminPurchasePrice">Precio compra</label><input id="adminPurchasePrice" name="purchasePrice" class="form-control" type="number" min="0" step="0.01" required/></div>
            <div class="col-md-4"><label class="form-label" for="adminRentalPrice">Precio renta</label><input id="adminRentalPrice" name="rentalPrice" class="form-control" type="number" min="0" step="0.01" required/></div>
            <div class="col-md-4"><label class="form-label" for="adminRentalDays">Días de renta</label><input id="adminRentalDays" name="rentalDays" class="form-control" type="number" min="1" step="1" required/></div>
            <div class="col-md-8"><label class="form-label" for="adminImage">URL de portada</label><input id="adminImage" name="image" class="form-control" type="url"/></div>
            <div class="col-12"><label class="form-label" for="adminDescription">Descripción</label><textarea id="adminDescription" name="description" rows="3" class="form-control" required></textarea></div>
            <div class="col-12"><button class="btn btn-success" type="submit">Dar de alta libro</button></div>
          </form>
        </div></div></div>
        <div class="col-lg-5"><div class="card"><div class="card-body">
          <h2 class="h5">Dar de baja libro</h2>
          <form id="adminDeleteForm" class="d-grid gap-3"><div><label for="adminBookSelect" class="form-label">Libro disponible</label><select id="adminBookSelect" class="form-select"></select></div><button class="btn btn-outline-danger" type="submit">Dar de baja</button></form>
          <div id="adminFeedback" class="alert d-none mt-3 mb-0"></div>
        </div></div></div>
      </div>
    </main>
    <script src="admin.js"></script>
  </body>
</html>
